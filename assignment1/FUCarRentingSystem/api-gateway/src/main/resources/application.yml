server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/api/customers/**
        - id: car-service
          uri: lb://CAR-SERVICE
          predicates:
            - Path=/api/cars/**, /api/manufacturers/**, /api/suppliers/**
        - id: renting-service
          uri: lb://RENTING-SERVICE
          predicates:
            - Path=/api/rentings/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: 357638792F423F4528482B4D6251655468576D5A7134743777217A25432A462D
  expiration: 86400000

