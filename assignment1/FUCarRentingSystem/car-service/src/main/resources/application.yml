server:
  port: 8082

spring:
  application:
    name: car-service
  datasource:
    url: jdbc:postgresql://localhost:5432/car_db
    driver-class-name: org.postgresql.Driver
    username: root
    password: 
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
