server:
  port: 8083

spring:
  application:
    name: renting-service
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=FUCarRentingSystem;encrypt=false;trustServerCertificate=true
    username: sa
    password: Password123!
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
